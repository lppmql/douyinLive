<!DOCTYPE html>
<html lang="zh-CN" style="overflow-x: hidden; height: 100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <title>DataEase</title>

    <script type="module">
      const DATAEASE_KEY = 'DataEaseKey';
      const KEY_VERSION = 'douyinLive.dataeaseKeySha256';
      const CACHE_EXPIRES_AT = Date.UTC(9999, 11, 31, 23, 59, 59);

      async function sha256(value) {
        const bytes = new TextEncoder().encode(value);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(digest), byte => byte.toString(16).padStart(2, '0')).join('');
      }

      async function refreshDataEaseKey() {
        // 先淘汰旧值；即使公钥请求失败，官方页面也会重新请求而不会继续使用旧密钥。
        try {
          localStorage.removeItem(DATAEASE_KEY);
        } catch {
          // 浏览器禁用本地存储时仍继续加载官方页面。
        }

        try {
          const response = await fetch('./de2api/dekey', {
            cache: 'no-store',
            headers: { Accept: 'application/json' }
          });
          if (!response.ok) return;

          const payload = await response.json();
          if (payload.code !== 0 || typeof payload.data !== 'string') return;

          const currentVersion = await sha256(payload.data);
          // DataEase 的 wsCache 使用 web-storage-cache 包装值，不能直接写入公钥字符串。
          const cacheItem = {
            c: Date.now(),
            e: CACHE_EXPIRES_AT,
            v: JSON.stringify(payload.data)
          };
          localStorage.setItem(DATAEASE_KEY, JSON.stringify(cacheItem));
          localStorage.setItem(KEY_VERSION, currentVersion);
        } catch {
          // DataEase 自身仍会请求公钥；兼容层失败时不阻断官方页面加载。
        }
      }

      await refreshDataEaseKey();
      await import('./js/index-2.10.20-dataease.js');
    </script>
    <link rel="stylesheet" crossorigin href="./assets/css/style-2.10.20-dataease.css" />
  </head>

  <body style="height: 100%">
    <div class="de-main_scrollbar" id="app" style="height: 100%"></div>
  </body>
</html>
