# 抖音留资直播分析系统 - Docker 服务编排
# Phase 0: MySQL + Redis
# Phase 5: 加入 FunASR
# Phase 6: 加入 DataEase

services:
  mysql:
    image: mysql:8.0
    container_name: douyin_live_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: douyin_live
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7
    container_name: douyin_live_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.13
    container_name: douyin_live_funasr
    restart: unless-stopped
    ports:
      - "10096:10095"
    volumes:
      - funasr_models:/workspace/models
    environment:
      - GPU_ID=-1
    entrypoint: ["/usr/bin/bash", "-c"]
    command: >
      cd /workspace/FunASR/runtime &&
      nohup bash run_server_2pass.sh
        --certfile 0
        --download-model-dir /workspace/models
        --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx
        --model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-onnx
        --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx
        --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx
        --itn-dir thuduj12/fst_itn_zh
        --port 10095 > /workspace/models/funasr.log 2>&1 &
    profiles:
      - funasr

volumes:
  mysql_data:
  redis_data:
  funasr_models:
