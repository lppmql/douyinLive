# 抖音留资直播分析系统 - Docker 服务编排
# Phase 0: MySQL + Redis
# Phase 5: 加入 FunASR
# Phase 6: 加入 DataEase

services:
  mysql:
    image: mysql:8.0
    container_name: douyin_live_mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:?请在 .env 设置 DB_PASSWORD}
      MYSQL_DATABASE: douyin_live
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - ./data/mysql:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --group_concat_max_len=1024000

  redis:
    image: redis:7
    container_name: douyin_live_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes

  funasr:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-online-cpu-0.1.13
    container_name: douyin_live_funasr
    restart: unless-stopped
    # 8GB Mac 上限制识别容器资源，避免话术生成期间占满整机。
    cpus: 2.0
    mem_limit: 1800m
    ports:
      - "127.0.0.1:10096:10095"
    volumes:
      - ./data/funasr/models:/workspace/models
    working_dir: /workspace/FunASR/runtime
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - "bash run_server_2pass.sh --certfile 0 --download-model-dir /workspace/models --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx --model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-onnx --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx --itn-dir thuduj12/fst_itn_zh --lm-dir '' --hotword /workspace/models/hotwords.txt; while pgrep -f '/funasr-wss-server-2pass' >/dev/null; do sleep 5; done; exit 1"
    profiles:
      - funasr

  dataease:
    image: registry.cn-qingdao.aliyuncs.com/dataease/dataease:v2.10.25
    container_name: douyin_live_dataease
    restart: unless-stopped
    cpus: 1.0
    mem_limit: 1200m
    ports:
      - "127.0.0.1:8100:8100"
    environment:
      # 外部首页仅负责淘汰数据库恢复前遗留的旧 RSA 公钥，其他资源继续使用官方 JAR。
      SPRING_WEB_RESOURCES_STATIC_LOCATIONS: file:/opt/dataease-overlay/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/
      # DataEase 官方 iframe 嵌入要求：与根 .env 的 CORS_ORIGINS 保持一致
      DATAEASE_ORIGIN_LIST: ${CORS_ORIGINS:-http://localhost:9527,http://127.0.0.1:9527}
    volumes:
      - ./dataease/conf/application.yml:/opt/apps/config/application.yml
      - ./deploy/dataease-overlay/static:/opt/dataease-overlay:ro
      - ./data/dataease/data:/opt/dataease2.0/data
      - ./data/dataease/logs:/opt/dataease2.0/logs
    depends_on:
      mysql:
        condition: service_started
    profiles:
      - dataease

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: douyin_live_prometheus
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    profiles:
      - observability

  grafana:
    image: grafana/grafana:12.4.0
    container_name: douyin_live_grafana
    restart: unless-stopped
    cpus: 0.5
    mem_limit: 512m
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-this-before-enabling-observability}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    profiles:
      - observability

volumes:
  prometheus_data:
  grafana_data:
