name: Project checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci-test-password
          MYSQL_DATABASE: douyin_live
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pci-test-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DEBUG: "true"
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ci-test-password
      DB_NAME: douyin_live
      REDIS_URL: redis://127.0.0.1:6379
      JWT_SECRET_KEY: ci-only-secret
      ASR_AUTO_START: "false"
      MONITOR_ENABLED: "false"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: pytest -q

  frontend-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: cp .env.ci .env
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm exec oxlint .
      - run: pnpm exec eslint .
      - run: pnpm build

  # 检查前端 API 类型是否与后端 OpenAPI schema 同步
  # 后端改了 Pydantic model 后，如果前端没重新 pnpm gen-api，这里会失败
  check-api-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Export OpenAPI schema from FastAPI
        run: |
          cd backend
          python -c "from app.main import app; import json; print(json.dumps(app.openapi()))" > /tmp/openapi.json

      - name: Generate TypeScript types from schema
        run: |
          cd frontend
          npx openapi-typescript /tmp/openapi.json -o /tmp/generated.d.ts

      - name: Check types are in sync with committed version
        run: |
          # 对比时跳过文件头注释（openapi-typescript 版本号可能不同）
          diff <(tail -n +5 /tmp/generated.d.ts) <(tail -n +5 frontend/src/typings/api/generated.d.ts) || {
            echo ""
            echo "❌ 前端 API 类型与后端 OpenAPI schema 不同步！"
            echo "   请本地运行: cd frontend && pnpm gen-api"
            echo "   然后提交更新后的 src/typings/api/generated.d.ts"
            exit 1
          }
          echo "✅ API 类型与后端 schema 一致"
